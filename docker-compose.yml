version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - GEMINI_API_KEY
    # Restart policy for production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - GEMINI_API_KEY
    # Ensure frontend starts after backend
    depends_on:
      - backend
    restart: unless-stopped